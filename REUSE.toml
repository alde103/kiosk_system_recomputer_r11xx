version = 1

[[annotations]]
path = [
 ".formatter.exs",
 ".gitignore",
 "CHANGELOG.md",
 "nerves_defconfig",
 "NOTICE",
 "REUSE.toml",
 "mix.exs",
 "mix.lock",
 "VERSION"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "None"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = [
 "README.md"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2019 Frank Hunleth"
SPDX-License-Identifier = "CC-BY-4.0"

# Buildroot derived or related files
# NOTE: packages here proactively have copyright assigned to the Buildroot
# developers to avoid worrying about copyright assignment when upstreaming.
[[annotations]]
path = [
 "Config.in",
 "package/**",
 "external.mk",
 "post-build.sh",
 "post-createfs.sh"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "The Buildroot developers <buildroot@buildroot.org>"
SPDX-License-Identifier = "GPL-2.0-or-later"

# Patches applied to upstream Buildroot packages (derive from the patched project)
[[annotations]]
path = [
 "patches/**"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "The GStreamer developers"
SPDX-License-Identifier = "LGPL-2.1-or-later"

# Linux kernel derived or related files
[[annotations]]
path = [
 "linux-6.12.defconfig",
 "ramoops-pi4-overlay.dts"
]
precedence = "override"
SPDX-FileCopyrightText = "Various"
SPDX-License-Identifier = "GPL-2.0-only"

# Fwup config files
[[annotations]]
path = [
 "fwup-ops.conf",
 "fwup.conf",
 "fwup.conf.eex",
 "fwup_include/*"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "None"
SPDX-License-Identifier = "CC0-1.0"

# Various config files
[[annotations]]
path = [
 "busybox.fragment",
 "cmdline-a.txt",
 "cmdline-b.txt",
 "config.txt",
 "rootfs_overlay/etc/boardid.config",
 "rootfs_overlay/etc/erlinit.config",
 "rootfs_overlay/etc/fw_env.config"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "None"
SPDX-License-Identifier = "CC0-1.0"

# reComputer R11xx product image
# https://www.seeedstudio.com/reComputer-R1113-10-p-6258.html
[[annotations]]
path = [
 "assets/images/recomputer-r11xx.jpg"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Seeed Studio"
SPDX-License-Identifier = "CC-BY-4.0"
